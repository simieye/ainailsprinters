name: ai_nails_app
description: AI NAILS APP - 全球首款基于 OpenClaw 原生技术构建的智能美业客户端
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # UI & Animation
  cupertino_icons: ^1.0.6
  lottie: ^2.7.0
  shimmer: ^3.0.0
  flutter_animate: ^4.3.0
  glassmorphism: ^3.0.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Router
  go_router: ^13.0.0
  
  # Networking & MCP
  web_socket_channel: ^2.4.0
  dio: ^5.4.0
  json_annotation: ^4.8.1
  
  # AR & Camera
  camera: ^0.10.5
  ar_flutter_plugin: ^0.7.3
  
  # Storage & Local
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Device & Hardware
  bluetooth_thermal_printer: ^0.0.6
  connectivity_plus: ^5.0.2
  
  # Media & Image
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  
  # Internationalization
  intl: ^0.19.0
  easy_localization: ^3.0.3
  
  # Charts
  fl_chart: ^0.66.0
  
  # Audio & Voice
  speech_to_text: ^6.5.1
  flutter_tts: ^3.8.0
  
  # Utils
  uuid: ^4.2.2
  freezed_annotation: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  generate: true
  
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
    - assets/fonts/
    - assets/i18n/
  
  fonts:
    - family: CyberNeon
      fonts:
        - asset: assets/fonts/CyberNeon-Regular.ttf
        - asset: assets/fonts/CyberNeon-Bold.ttf
          weight: 700
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Regular.ttf
        - asset: assets/fonts/NotoSansSC-Bold.ttf
          weight: 700
