name: Build & Release Multi-Platform

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  # ==================== 代码质量检查 ====================
  analyze:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # ==================== Android Build ====================
  build-android:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (arm64-v8a + armeabi-v7a + x86_64)
        run: flutter build apk --release --split-per-abi

      - name: Build AAB (Google Play)
        run: flutter build appbundle --release

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ==================== iOS Build ====================
  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no code sign - for archive only)
        run: |
          cd ios
          pod install || true
          cd ..
          flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/Release-iphoneos/Runner.app Payload/
          zip -r ai_nails_ios.zip Payload
          mv ai_nails_ios.zip ai_nails_ios.ipa

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ai_nails_ios.ipa
          retention-days: 30

  # ==================== macOS Build (增强版) ====================
  build-macos:
    name: Build macOS Desktop
    runs-on: macos-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install CocoaPods
        run: |
          cd macos
          pod install || pod install --repo-update
          cd ..

      - name: Build macOS Release
        run: flutter build macos --release

      - name: Create DMG installer
        run: |
          APP_NAME="AI NAILS"
          DMG_NAME="AI_NAILS_macOS"
          VERSION="${{ github.ref_name }}"

          # 创建临时目录
          mkdir -p dmg_contents
          cp -R "build/macos/Build/Products/Release/${APP_NAME}.app" dmg_contents/

          # 创建 Applications 快捷方式
          ln -s /Applications dmg_contents/Applications

          # 创建 DMG
          hdiutil create -volname "${APP_NAME}" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "${DMG_NAME}.dmg"

          # 也创建 zip 包
          cd build/macos/Build/Products/Release
          zip -r "../../../../../${DMG_NAME}.zip" "${APP_NAME}.app"
          cd ../../../../..

          echo "macOS DMG: ${DMG_NAME}.dmg"
          echo "macOS ZIP: ${DMG_NAME}.zip"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: AI_NAILS_macOS.dmg
          retention-days: 30

      - name: Upload macOS ZIP
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: AI_NAILS_macOS.zip
          retention-days: 30

  # ==================== Windows Build (增强版) ====================
  build-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows Release
        run: flutter build windows --release

      - name: Package Windows (Portable ZIP)
        run: |
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath "AI_NAILS_Windows_portable.zip"

      - name: Upload Windows Portable
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: AI_NAILS_Windows_portable.zip
          retention-days: 30

      - name: Create Windows Installer (Inno Setup)
        run: |
          # 使用 Inno Setup 创建安装包
          choco install innosetup -y

          $version = "${{ github.ref_name }}" -replace '^v', ''
          $appDir = "build\windows\x64\runner\Release"

          $issContent = @"
          [Setup]
          AppName=AI NAILS
          AppVersion=${version}
          AppPublisher=AI NAILS Team
          AppPublisherURL=https://github.com/simieye/ainailsprinters
          DefaultDirName={autopf}\AI NAILS
          DefaultGroupName=AI NAILS
          OutputBaseFilename=AI_NAILS_Windows_Setup
          Compression=lzma2
          SolidCompression=yes
          WizardStyle=modern
          SetupIconFile=windows\runner\resources\app_icon.ico
          UninstallDisplayIcon={app}\ai_nails_app.exe
          PrivilegesRequired=lowest

          [Files]
          Source: "${appDir}\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\AI NAILS"; Filename: "{app}\ai_nails_app.exe"
          Name: "{group}\Uninstall AI NAILS"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\AI NAILS"; Filename: "{app}\ai_nails_app.exe"
          "@

          $issContent | Out-File -FilePath "installer.iss" -Encoding UTF8

          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        continue-on-error: true

      - name: Upload Windows Installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: Output\AI_NAILS_Windows_Setup.exe
          retention-days: 30

  # ==================== Linux Build ====================
  build-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake clang pkg-config \
            libgtk-3-dev liblzma-dev \
            ninja-build

      - name: Install dependencies
        run: flutter pub get

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Linux Release
        run: flutter build linux --release

      - name: Package Linux
        run: |
          cd build/linux/x64/release
          tar -czf ../../../../AI_NAILS_Linux.tar.gz bundle/
          cd ../../../..

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: AI_NAILS_Linux.tar.gz
          retention-days: 30

  # ==================== 创建 GitHub Release ====================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios, build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Organize release assets
        run: |
          mkdir -p release
          # 重命名文件以便于识别
          find release-assets -name "*.dmg" -exec cp {} release/ \; 2>/dev/null || true
          find release-assets -name "*.zip" -exec cp {} release/ \; 2>/dev/null || true
          find release-assets -name "*.apk" -exec cp {} release/ \; 2>/dev/null || true
          find release-assets -name "*.aab" -exec cp {} release/ \; 2>/dev/null || true
          find release-assets -name "*.ipa" -exec cp {} release/ \; 2>/dev/null || true
          find release-assets -name "*.exe" -exec cp {} release/ \; 2>/dev/null || true
          find release-assets -name "*.tar.gz" -exec cp {} release/ \; 2>/dev/null || true
          echo "Release assets:"
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "AI NAILS v${{ github.ref_name }}"
          body: |
            ## 🚀 AI NAILS APP v${{ github.ref_name }}

            ### 🌍 多平台安装包

            | 平台 | 安装包 | 说明 |
            |------|--------|------|
            | 🍎 **macOS** | `AI_NAILS_macOS.dmg` | DMG 安装包，拖入 Applications |
            | 🪟 **Windows** | `AI_NAILS_Windows_Setup.exe` | Inno Setup 安装程序 |
            | 🪟 **Windows** | `AI_NAILS_Windows_portable.zip` | 免安装便携版 |
            | 🐧 **Linux** | `AI_NAILS_Linux.tar.gz` | Linux 桌面版 |
            | 🤖 **Android** | `android-apks/` | APK (arm64-v8a, armeabi-v7a, x86_64) + AAB |
            | 📱 **iOS** | `ai_nails_ios.ipa` | IPA (需自签名) |

            ### ✨ 功能亮点
            - 🎨 **AI 创作舱**：语音/文本 AI 生成美甲设计
            - 🖼️ **灵感矩阵**：10000+ 工业级图案库 + 太极64卦推荐
            - 🖨️ **龙虾智控**：3D 设备监控 + CMYK 墨盒管理
            - 📊 **商业协同**：45天 ROI + 多店管理
            - 👤 **创作者空间**：提示词资产 + 全球社区
            - 📱 **AR 预览**：3D 甲面试戴
            - 💻 **桌面增强**：侧边栏导航、拖拽导入、快捷键、原生窗口管理

            ### 🔧 安装说明
            - **macOS**: 打开 DMG，将 AI NAILS 拖入 Applications
            - **Windows**: 运行 Setup.exe 安装，或解压便携版直接使用
            - **Linux**: 解压 `tar.gz`，运行 `./ai_nails_app`
            - **Android**: 下载对应架构 APK 直接安装
            - **iOS**: 通过 Xcode 或 AltStore 侧载 IPA

            ### 🔗 相关链接
            - [GitHub 仓库](https://github.com/simieye/ainailsprinters)
            - [问题反馈](https://github.com/simieye/ainailsprinters/issues)
          draft: false
          prerelease: false
          files: |
            release/*
          token: ${{ secrets.GITHUB_TOKEN }}
